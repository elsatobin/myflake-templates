name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v21

      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false
          diff-store: true

      - name: check nix formatting with alejandra
        run: nix fmt -- --check .

  flake-check:
    name: flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v21

      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false
          diff-store: true

      - uses: DeterminateSystems/flake-checker-action@v12

      - name: nix flake check (root)
        run: nix flake check

  discover:
    name: discover templates
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v21

      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false
          diff-store: true

      - id: gen
        run: |
          matrix="[]"
          for tpl in $(nix flake show --json . | jq -r '.templates | keys[] | select(. != "default")'); do
            matrix=$(nix flake show --json "./templates/$tpl" | jq -c --arg t "$tpl" --argjson m "$matrix" \
              '$m + [.devShells."x86_64-linux" | keys[] | {"template": $t, "shell": .}]')
          done
          echo "matrix={\"include\":$matrix}" >> "$GITHUB_OUTPUT"

  templates:
    name: "${{ matrix.template }} (${{ matrix.shell }})"
    runs-on: ubuntu-latest
    needs: [format, flake-check, discover]
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v21

      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false
          diff-store: true

      - name: evaluate devshell
        run: nix develop ./templates/${{ matrix.template }}#${{ matrix.shell }} --command true
