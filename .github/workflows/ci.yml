name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: lint and discover
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v21

      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false
          diff-store: true

      - name: check nix formatting
        run: nix fmt -- --check .

      - uses: DeterminateSystems/flake-checker-action@v12

      - name: nix flake check
        run: nix flake check

      - id: gen
        name: discover template matrix
        run: |
          list_templates() {
            nix eval .#templates --apply 'tpls:
              builtins.filter (n: n != "default") (builtins.attrNames tpls)
            ' --json
          }

          list_shells() {
            nix eval "./templates/$1#devShells.x86_64-linux" --apply builtins.attrNames --json
          }

          matrix="[]"
          for tpl in $(list_templates | jq -r '.[]'); do
            matrix=$(list_shells "$tpl" | jq -c --arg t "$tpl" --argjson m "$matrix" \
              '$m + [.[] | {template: $t, shell: .}]')
          done

          echo "matrix={\"include\":$matrix}" >> "$GITHUB_OUTPUT"

  templates:
    name: "${{ matrix.template }} (${{ matrix.shell }})"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [checks]
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJSON(needs.checks.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v21

      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false
          diff-store: true

      - name: evaluate devshell
        run: nix develop ./templates/${{ matrix.template }}#${{ matrix.shell }} --command true
